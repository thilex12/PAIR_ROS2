# src\my_package\config\robots.yaml
robot_count: 2
arena_radius: 2.0
arena_walls:
  - x: 0.25
    y: 0.0
    width: 0.04
    depth: 1.4
    height: 0.16
    color: [0.5, 0.5, 0.5]

# When false, CBBA agents do not publish paths and nothing is drawn in Webots.
display_paths: true

# CBBA agent speed limits.
max_linear_speed: 0.4
max_angular_speed: 2.0